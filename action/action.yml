name: driftguard
description: Detect context drift in CLAUDE.md / AGENTS.md when PRs are opened

inputs:
  anthropic-api-key:
    description: Anthropic API key
    required: false
  groq-api-key:
    description: Groq API key
    required: false
  openai-api-key:
    description: OpenAI API key
    required: false
  github-token:
    description: GitHub token for PR comments
    required: true
    default: ${{ github.token }}
  confidence-threshold:
    description: Minimum confidence to flag a statement (0-1)
    required: false
    default: '0.65'
  comment-on-pr:
    description: Post a comment on the PR if drift is detected
    required: false
    default: 'true'

outputs:
  drift-detected:
    description: Whether driftguard detected context drift
  proposal:
    description: Unified diff proposal generated by driftguard
  confidence:
    description: Confidence score for the proposal

runs:
  using: node24
  main: dist/action.cjs
